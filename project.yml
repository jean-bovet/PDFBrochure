name: PDFBrochure
options:
  bundleIdPrefix: com.arizonasoftware
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"

targets:
  PDFBrochure:
    type: application
    platform: macOS
    sources:
      - path: Sources/App
      - path: Sources/Imposition
      - path: Resources
    dependencies:
      - framework: Frameworks/Sparkle.framework
        embed: true
        codeSign: true
    info:
      path: Sources/Info.plist
      properties:
        CFBundleName: PDFBrochure
        CFBundleDisplayName: PDFBrochure
        CFBundleIdentifier: com.arizonasoftware.PDFBrochure
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "13.0"
        NSHighResolutionCapable: true
        NSPrincipalClass: NSApplication
        CFBundlePackageType: APPL
        SUFeedURL: https://jean-bovet.github.io/PDFBrochure/appcast.xml
        SUPublicEDKey: cXwpLVnOD20AsQze2g/tc+bCEVFeZ1rhTad2BU0Ykgo=
        SUEnableAutomaticChecks: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.arizonasoftware.PDFBrochure
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: PDFBrochure.entitlements
        ARCHS: arm64
        ONLY_ACTIVE_ARCH: NO
        FRAMEWORK_SEARCH_PATHS:
          - $(PROJECT_DIR)/Frameworks
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"

  pdfbrochurecli:
    type: tool
    platform: macOS
    sources:
      - path: Sources/CLI
      - path: Sources/Imposition
    settings:
      base:
        PRODUCT_NAME: pdfbrochurecli
        PRODUCT_BUNDLE_IDENTIFIER: com.arizonasoftware.pdfbrochurecli
        ENABLE_HARDENED_RUNTIME: NO
        ARCHS: arm64
